<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Awesomemarkings</title>
</head>

<body style="margin:0;font-family: 'Trebuchet MS', sans-serif;background:#0b0b1a;color:white;overflow:hidden;">

<!-- Background Glow -->
<div style="
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 30% 40%, rgba(255,0,150,0.4), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,200,255,0.4), transparent 40%),
#0b0b1a;
z-index:-1;">
</div>

<!-- Floating particles -->
<div id="particles"></div>

<!-- Main -->
<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;">

  <!-- Title -->
  <h1 style="
    font-size:60px;
    background:linear-gradient(90deg,#ff4ecd,#38bdf8,#22c55e);
    -webkit-background-clip:text;
    color:transparent;
    margin:0;
    letter-spacing:2px;
  ">
    Awesomemarkings
  </h1>

  <!-- Subtitle -->
  <p style="margin-top:15px;font-size:20px;color:#cbd5f5;">
    crafting digital signals ⚡
  </p>

  <!-- Tagline -->
  <p style="margin-top:25px;max-width:500px;line-height:1.6;color:#94a3b8;">
    a minimal experimental space focused on building and testing modern communication systems.
  </p>

  <!-- Button -->
  <div style="margin-top:40px;">
    <a href="mailto:info@awesomemarkings.com" style="
      text-decoration:none;
      padding:12px 30px;
      border-radius:30px;
      background:linear-gradient(90deg,#ff4ecd,#38bdf8);
      color:white;
      font-weight:bold;
      box-shadow:0 0 20px rgba(255,0,150,0.6);
    ">
      Contact
    </a>
  </div>

</div>

<!-- Floating Particles Script -->
<script>
const container = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  let dot = document.createElement("div");
  dot.style.position = "absolute";
  dot.style.width = "3px";
  dot.style.height = "3px";
  dot.style.background = "white";
  dot.style.opacity = Math.random();
  dot.style.top = Math.random() * 100 + "vh";
  dot.style.left = Math.random() * 100 + "vw";
  dot.style.borderRadius = "50%";
  dot.style.animation = "float " + (5 + Math.random()*10) + "s linear infinite";
  container.appendChild(dot);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes float {
  0% { transform: translateY(0px); opacity:0.2; }
  50% { opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
